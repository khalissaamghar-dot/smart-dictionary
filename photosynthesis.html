<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photosynthesis Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 60%, #8B4513 60%, #654321 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 800px;
      height: 600px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    /* --- Sun and Light Rays --- */
    .sun {
      position: absolute;
      top: 30px;
      left: 30px;
      width: 90px;
      height: 90px;
      background: #FFD700;
      border-radius: 50%;
      box-shadow: 0 0 50px #FFD700, 0 0 100px #FFA500;
      animation: pulseSun 3s infinite alternate ease-in-out;
    }

    @keyframes pulseSun {
      0% {
        transform: scale(1);
        box-shadow: 0 0 40px #FFD700, 0 0 80px #FFA500;
      }

      100% {
        transform: scale(1.1);
        box-shadow: 0 0 60px #FFD700, 0 0 120px #FFA500;
      }
    }

    .ray-container {
      position: absolute;
      top: 75px;
      left: 75px;
    }

    .ray {
      position: absolute;
      background: linear-gradient(to bottom, rgba(255, 215, 0, 0.6), transparent);
      height: 450px;
      width: 30px;
      transform-origin: top center;
      border-radius: 15px;
      filter: blur(5px);
      animation: shine 4s infinite linear;
    }

    .ray:nth-child(1) {
      transform: rotate(35deg);
      left: 10px;
      animation-delay: 0s;
    }

    .ray:nth-child(2) {
      transform: rotate(50deg);
      left: 30px;
      animation-delay: 1.3s;
    }

    .ray:nth-child(3) {
      transform: rotate(65deg);
      left: 50px;
      animation-delay: 2.6s;
    }

    @keyframes shine {
      0% {
        opacity: 0.2;
        height: 350px;
      }

      50% {
        opacity: 0.6;
        height: 500px;
      }

      100% {
        opacity: 0.2;
        height: 350px;
      }
    }

    /* --- Plant --- */
    .plant {
      position: absolute;
      bottom: 240px;
      /* Ground level */
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }

    .stem {
      width: 16px;
      height: 220px;
      background: linear-gradient(to right, #228B22, #32CD32);
      border-radius: 8px;
      position: relative;
      box-shadow: inset -3px 0 5px rgba(0, 0, 0, 0.2);
    }

    .leaf {
      position: absolute;
      width: 100px;
      height: 50px;
      background: linear-gradient(135deg, #32CD32, #006400);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3), 2px 5px 10px rgba(0, 0, 0, 0.2);
      animation: waveLeaf 4s infinite ease-in-out alternate;
    }

    .leaf::after {
      content: '';
      position: absolute;
      width: 80%;
      height: 2px;
      background: rgba(255, 255, 255, 0.3);
      top: 50%;
      left: 10%;
      transform: translateY(-50%);
      border-radius: 2px;
    }

    .leaf.left {
      left: -90px;
      top: 50px;
      transform-origin: bottom right;
      border-radius: 50px 0 50px 0;
      transform: rotate(-15deg);
    }

    .leaf.right {
      right: -90px;
      top: 100px;
      transform-origin: bottom left;
      border-radius: 0 50px 0 50px;
      transform: rotate(15deg);
      animation-delay: -2s;
      /* Offset animation */
    }

    @keyframes waveLeaf {
      0% {
        transform: rotate(-15deg);
      }

      100% {
        transform: rotate(-5deg);
      }
    }

    .leaf.right {
      animation-name: waveLeafRight;
    }

    @keyframes waveLeafRight {
      0% {
        transform: rotate(15deg);
      }

      100% {
        transform: rotate(5deg);
      }
    }

    /* Roots */
    .roots-container {
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
    }

    .root {
      position: absolute;
      width: 8px;
      background: #5C4033;
      border-radius: 4px;
      transform-origin: top center;
    }

    .root.r1 {
      height: 70px;
      left: -10px;
      transform: rotate(25deg);
    }

    .root.r2 {
      height: 100px;
      left: 0px;
      transform: rotate(0deg);
    }

    .root.r3 {
      height: 80px;
      left: 10px;
      transform: rotate(-25deg);
    }

    /* --- Particles --- */
    .particle {
      position: absolute;
      font-weight: 800;
      font-size: 13px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    /* CO2 */
    .co2 {
      color: white;
      background: #606060;
      border: 2px solid #404040;
      width: 40px;
      height: 40px;
      animation: fallCO2 4s infinite ease-in;
    }

    @keyframes fallCO2 {
      0% {
        transform: translate(-100px, -200px) scale(0.8);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        transform: translate(50px, 80px) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(120px, 150px) scale(0.5);
        opacity: 0;
      }

      /* Enters left leaf */
    }

    /* H2O */
    .h2o {
      color: white;
      background: linear-gradient(135deg, #00BFFF, #1E90FF);
      width: 36px;
      height: 36px;
      border: 2px solid #87CEFA;
      animation: riseH2O 4s infinite ease-out;
    }

    @keyframes riseH2O {
      0% {
        transform: translate(0, 150px) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 1;
        transform: translate(0, 100px) scale(1);
      }

      80% {
        transform: translate(0, -100px) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(0, -150px) scale(0.5);
        opacity: 0;
      }

      /* Reaches leaves */
    }

    /* O2 */
    .o2 {
      color: #004d00;
      background: #E0FFFF;
      border: 2px solid #00CED1;
      width: 36px;
      height: 36px;
      animation: floatO2 4s infinite ease-out;
    }

    @keyframes floatO2 {
      0% {
        transform: translate(50px, 50px) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 1;
        transform: translate(80px, 30px) scale(1);
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translate(200px, -150px) scale(1.5);
        opacity: 0;
      }

      /* Floats away */
    }

    /* Glucose */
    .glucose {
      color: #000;
      font-size: 10px;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #ADFF2F, #32CD32);
      border: 2px solid #7CFC00;
      box-shadow: 0 0 20px #ADFF2F;
      animation: flowGlucose 4s infinite ease-in-out;
    }

    @keyframes flowGlucose {
      0% {
        transform: translate(0, 50px) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 1;
        transform: translate(0, 80px) scale(1);
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translate(0, 250px) scale(0.5);
        opacity: 0;
      }

      /* Flows to roots */
    }

    /* --- Labels --- */
    .label {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 15px;
      border-radius: 12px;
      font-weight: bold;
      color: #2c3e50;
      font-size: 15px;
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-left: 4px solid #3498db;
      z-index: 20;
    }

    .label-sun {
      top: 30px;
      left: 140px;
      border-color: #FFD700;
    }

    .label-co2 {
      top: 120px;
      left: 40px;
      border-color: #606060;
    }

    .label-o2 {
      top: 120px;
      right: 40px;
      border-color: #00CED1;
    }

    .label-h2o {
      bottom: 120px;
      left: 40px;
      border-color: #1E90FF;
    }

    .label-glucose {
      bottom: 120px;
      right: 40px;
      border-color: #32CD32;
    }
  </style>
</head>

<body>

  <div class="scene">
    <!-- Labels -->
    <div class="label label-sun">☀️ Sunlight (Energy)</div>
    <div class="label label-co2">💨 CO₂ absorbed</div>
    <div class="label label-o2">🍃 O₂ released</div>
    <div class="label label-h2o">💧 H₂O from roots</div>
    <div class="label label-glucose">✨ Glucose (Energy)</div>

    <!-- Sun -->
    <div class="sun"></div>
    <div class="ray-container">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
    </div>

    <!-- Plant -->
    <div class="plant">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
      <div class="stem">
        <div class="roots-container">
          <div class="root r1"></div>
          <div class="root r2"></div>
          <div class="root r3"></div>
        </div>
      </div>
    </div>

    <!-- Particles Container -->
    <div id="particles"></div>
  </div>

  <script>
    const container = document.getElementById('particles');

    function createParticle(type, className, delay, x, y) {
      const p = document.createElement('div');
      p.className = `particle ${className}`;
      p.innerText = type;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.animationDelay = delay + 's';
      container.appendChild(p);
    }

    // Generate continuous particles

    // CO2 Particles (left side falling into left leaf)
    createParticle('CO₂', 'co2', 0, 250, 150);
    createParticle('CO₂', 'co2', 1.3, 220, 120);
    createParticle('CO₂', 'co2', 2.6, 280, 180);

    // H2O Particles (rising up from roots, center)
    createParticle('H₂O', 'h2o', 0.5, 382, 450);
    createParticle('H₂O', 'h2o', 1.8, 382, 450);
    createParticle('H₂O', 'h2o', 3.1, 382, 450);

    // O2 Particles (right side floating away from right leaf)
    createParticle('O₂', 'o2', 1.0, 420, 250);
    createParticle('O₂', 'o2', 2.3, 450, 220);
    createParticle('O₂', 'o2', 3.6, 390, 280);

    // Glucose Particles (flowing down the stem)
    createParticle('Glucose', 'glucose', 1.5, 375, 200);
    createParticle('Glucose', 'glucose', 2.8, 375, 200);
    createParticle('Glucose', 'glucose', 4.1, 375, 200);

  </script>

</body>

</html>
