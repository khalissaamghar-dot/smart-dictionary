<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scientific Dictionary | قاموسي الذكي</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="apple-touch-icon" href="img/logo.png">

    <!-- Fonts: Outfit (English/French) and Cairo (Arabic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Outfit:wght@300;400;600;700&family=Noto+Sans+Tifinagh&display=swap"
        rel="stylesheet">

    <!-- MathJS: Professional Math Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.js"></script>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css?v=2">
    <link rel="stylesheet" href="css/audio-buttons.css">
</head>

<body>
    <div id="background-layer">
        <!-- Animated Background Elements -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <!-- Scientific Decorative Accents -->
        <div class="sci-decor" style="top: 10%; left: 10%;"><i data-lucide="atom" size="100"></i></div>
        <div class="sci-decor" style="bottom: 15%; right: 10%;"><i data-lucide="dna" size="90"></i></div>
        <div class="sci-decor" style="top: 25%; right: 20%;"><i data-lucide="flask-conical" size="70"></i></div>
        <div class="sci-decor" style="bottom: 25%; left: 15%;"><i data-lucide="orbit" size="120"></i></div>
        <div class="sci-decor" style="top: 55%; left: 5%;"><i data-lucide="microscope" size="85"></i></div>
        <div class="sci-decor" style="top: 45%; right: 5%;"><i data-lucide="telescope" size="110"></i></div>
        <div class="sci-decor" style="top: 5%; left: 40%;"><i data-lucide="binary" size="60"></i></div>
        <div class="sci-decor" style="bottom: 5%; right: 40%;"><i data-lucide="pi" size="50"></i></div>
        <div class="sci-decor" style="top: 70%; right: 25%;"><i data-lucide="gauge" size="65"></i></div>
        <div class="sci-decor" style="bottom: 45%; left: 30%;"><i data-lucide="compass" size="75"></i></div>
        <div class="sci-decor"
            style="top: 15%; right: 60%; font-size: 2rem; font-family: serif; font-style: italic; opacity: 0.1;">E = mc²
        </div>
        <div class="sci-decor"
            style="bottom: 20%; left: 50%; font-size: 1.5rem; font-family: serif; font-style: italic; opacity: 0.1;">H₂O
        </div>

        <div class="grid-overlay"></div>
    </div>

    <div id="app" class="glass-container">
        <!-- App Content Injected Here -->
    </div>

    <!-- File Protocol Warning Script -->
    <script>
        if (window.location.protocol === 'file:') {
            document.write(`
                <div style="position:fixed;inset:0;background:rgba(0,0,0,0.9);color:white;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:system-ui,sans-serif;padding:20px;">
                    <h1 style="color:#ef4444;font-size:2rem;margin-bottom:1rem;">⚠️ App Cannot Run Directly From File</h1>
                    <p style="font-size:1.2rem;max-width:600px;line-height:1.6;margin-bottom:2rem;">
                        Modern security policies prevent this app from loading its features when opened directly as a file.<br>
                        You must run it using a local server.
                    </p>
                    <div style="background:#1e293b;padding:20px;border-radius:8px;text-align:left;">
                        <p style="color:#94a3b8;margin-bottom:10px;font-size:0.9rem;">Run this command in your terminal:</p>
                        <code style="color:#38bdf8;font-size:1.1rem;">python -m http.server 8000</code>
                    </div>
                </div>
            `);
            // Stop further execution
            window.stop();
        }
    </script>

    <!-- Scripts -->
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = 'position:fixed;bottom:20px;left:20px;right:20px;background:#fef2f2;color:#991b1b;padding:20px;border:2px solid #ef4444;border-radius:12px;z-index:10000;font-family:monospace;white-space:pre-wrap;box-shadow:0 10px 30px rgba(0,0,0,0.1);';
            errorDiv.innerHTML = `<h3 style="margin-top:0;">🛑 Script Error Detected</h3><p>${msg}</p><p style="font-size:0.8rem;opacity:0.7;">${url} : ${lineNo}:${columnNo}</p>`;
            document.body.appendChild(errorDiv);
            return false;
        };
    </script>
    <script type="module" src="js/app.js"></script>

    <!-- Lightbox Overlay -->
    <div id="lightbox-overlay" onclick="window._closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="window._closeLightbox()">
                <i data-lucide="x" size="24"></i>
            </button>
            <div id="lightbox-media-container" style="width: 100%; height: auto; max-height: 70vh; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 12px; overflow: hidden;">
                <img id="lightbox-image" src="" alt="Expanded Image" style="max-width: 100%; max-height: 70vh; display: none;">
                <video id="lightbox-video" src="" controls autoplay style="max-width: 100%; max-height: 70vh; display: none;"></video>
            </div>
            <p id="lightbox-caption" style="margin-top: 15px; text-align: center; font-weight: 600; color: #1e293b;"></p>
        </div>
    </div>

</body>

</html>
